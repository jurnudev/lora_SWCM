<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta id="theme-color-meta" name="theme-color" content="#f4f6f9">
  <title>SWCM Smart Farm K674</title>
  <style>
    /* ===== THEME DEFINITIONS ===== */
    :root {
      --bg-app: #121212;
      --bg-card: #1e1e1e;
      --bg-header: rgba(18, 18, 18, 0.85);
      --text-main: #ffffff;
      --text-dim: #a0a0a0;
      --text-muted: #666666;
      --border: rgba(255, 255, 255, 0.05);
      --shadow-card: 0 4px 10px rgba(0, 0, 0, 0.3);

      --accent: #22c55e;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --header-h: calc(100px + var(--safe-top));

      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg-app: #f4f6f9;
      --bg-card: rgba(255, 255, 255, 0.75);
      --bg-header: rgba(244, 246, 249, 0.85);
      --text-main: #1e293b;
      --text-dim: #64748b;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.5);
      --shadow-card: 0 8px 24px rgba(149, 157, 165, 0.15);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-app);
      color: var(--text-main);
      line-height: 1.4;
      overflow-x: hidden;
      user-select: none;
      transition: background 0.5s ease, color 0.5s ease;
    }

    /* ===== APP SHELL ===== */
    .app-container {
      max-width: 500px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg-app);
      position: relative;
    }

    @media (min-width: 1024px) {
      .app-container {
        max-width: 800px;
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
    }

    /* ===== HEADER ===== */
    .app-header {
      padding: calc(20px + var(--safe-top)) 20px 15px;
      background: var(--bg-header);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .back-btn {
      font-size: 24px;
      cursor: pointer;
      color: var(--text-main);
    }

    .header-icons {
      display: flex;
      gap: 20px;
      font-size: 20px;
      color: var(--text-dim);
    }

    .app-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 5px;
    }

    .app-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* Large LED Status Indicators */
    .led-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background-color: #4b5563;
      /* Gray OFFLINE */
      box-shadow: 0 0 5px rgba(75, 85, 99, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-block;
    }

    .led-dot.active {
      background-color: #10b981;
      /* Green ONLINE */
      box-shadow: 0 0 15px #10b981, 0 0 5px #10b981;
    }

    /* ===== MAIN CONTENT ===== */
    .app-main {
      padding: 20px;
      flex: 1;
    }

    .page-section {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ===== Battle/Power Switch Button Style ===== */
    .power-btn-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: var(--bg-card);
      padding: 20px 15px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      width: 100%;
    }

    .power-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: #374151;
      border: 3px solid #1f2937;
      color: #9ca3af;
      font-size: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.05);
      position: relative;
    }

    .power-btn:active {
      transform: scale(0.92);
    }

    .power-btn.active {
      background: #10b981;
      border-color: #047857;
      color: #ffffff;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.6), inset 0 2px 4px rgba(255, 255, 255, 0.2);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
    }

    .power-btn-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ===== SENSOR MONITORING ===== */
    .sensor-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .sensor-card {
      background: var(--bg-card);
      padding: 18px 20px;
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sensor-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-dim);
    }

    .sensor-value-row {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .sensor-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #00d4ff;
    }

    .sensor-unit {
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    .progress-container {
      height: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: #00d4ff;
      width: 0%;
      transition: width 1s ease;
    }

    /* ===== GAUGES (SEMICIRCLE) ===== */
    .gauge-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .gauge-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .gauge-box {
      position: relative;
      width: 140px;
      height: 80px;
      overflow: hidden;
    }

    .gauge-svg {
      width: 140px;
      height: 140px;
      transform: rotate(-180deg);
    }

    .gauge-bg {
      fill: none;
      stroke: #333;
      stroke-width: 12;
    }

    .gauge-fill {
      fill: none;
      stroke: #3b82f6;
      stroke-width: 12;
      stroke-dasharray: 188.5;
      stroke-dashoffset: 188.5;
      transition: stroke-dashoffset 1s ease;
      stroke-linecap: round;
    }

    .gauge-fill.red {
      stroke: #ef4444;
    }

    .gauge-value-center {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .gauge-labels {
      display: flex;
      justify-content: space-between;
      width: 140px;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: -5px;
    }

    /* ===== THEME TOGGLE ===== */
    .theme-toggle {
      position: fixed;
      top: calc(18px + var(--safe-top));
      right: 20px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      z-index: 1000;
      transition: var(--transition);
    }

    [data-theme="light"] .theme-toggle {
      background: rgba(255, 255, 255, 0.6);
    }

    .theme-toggle:active {
      transform: scale(0.9);
    }

    /* ===== LOADING OVERLAY ===== */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg-app);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(34, 197, 94, 0.1);
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body data-theme="light">
  <script>
    (function () {
      const savedTheme = localStorage.getItem('blynk-theme');
      const theme = savedTheme ? savedTheme : 'light';
      if (theme === 'dark') {
        document.body.setAttribute('data-theme', 'dark');
        const meta = document.getElementById('theme-color-meta');
        if (meta) meta.setAttribute('content', '#121212');
      }
    })();
  </script>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-weight:600; color:var(--text-dim)">Connecting...</p>
  </div>

  <div class="app-container">
    <!-- HEADER -->
    <header class="app-header">
      <div class="header-top">
        <div class="back-btn">←</div>
        <div class="header-icons" style="margin-right: 45px;">
          <span>📦</span>
          <span>🔔</span>
        </div>
      </div>

      <div class="app-title-row">
        <h1 class="app-title">SWCM Smart Farm K674</h1>
      </div>

      <div class="header-meta" style="display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap;">
        <div class="meta-item"
          style="display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px;">
          <span id="dot-hw" class="led-dot"></span> Hardware
        </div>
        <div class="meta-item"
          style="display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.5px;">
          <span id="dot-lora" class="led-dot"></span> LoRa
        </div>
        <div class="meta-item"
          style="display: flex; align-items: center; gap: 6px; font-weight: 600; font-size: 0.9rem; margin-left: auto;">
          🕒 <span id="live-clock">--:--:--</span>
        </div>
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <main class="app-main">

      <section id="monitors" class="page-section">
        <!-- VALVE CONTROLS (Battle/Power Button Style) -->
        <div class="valve-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
          <div class="power-btn-container">
            <span class="power-btn-label">วาล์วน้ำ (Watering)</span>
            <button class="power-btn" id="pbtn-1" onclick="toggleValve(1)">⏻</button>
          </div>
          <div class="power-btn-container">
            <span class="power-btn-label">หัวพ่นหมอก (Spray)</span>
            <button class="power-btn" id="pbtn-2" onclick="toggleValve(2)">⏻</button>
          </div>
        </div>

        <!-- SENSOR GRID (Soil Moisture Card only) -->
        <div class="sensor-grid">
          <div class="sensor-card">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
              <span class="sensor-label">ความชื้นในดิน (Soil Moisture)</span>
              <div class="sensor-value-row">
                <span class="sensor-value" id="val-soil" style="color: #22c55e;">--</span>
                <span class="sensor-unit">%</span>
              </div>
            </div>
            <div class="progress-container">
              <div class="progress-fill" id="bar-soil" style="background: #22c55e;"></div>
            </div>
          </div>
        </div>

        <!-- GAUGES -->
        <div class="gauge-row">
          <div class="gauge-container">
            <span class="sensor-label">ความชื้นในอากาศ</span>
            <div class="gauge-box">
              <svg class="gauge-svg">
                <circle class="gauge-bg" cx="70" cy="70" r="60" stroke-dasharray="188.5" stroke-dashoffset="0" />
                <circle class="gauge-fill" id="gauge-humi" cx="70" cy="70" r="60" />
              </svg>
              <div class="gauge-value-center" id="txt-humi" style="color:#3b82f6">--%</div>
            </div>
            <div class="gauge-labels"><span>0</span><span>100</span></div>
          </div>
          <div class="gauge-container">
            <span class="sensor-label">อุณหภูมิ</span>
            <div class="gauge-box">
              <svg class="gauge-svg">
                <circle class="gauge-bg" cx="70" cy="70" r="60" stroke-dasharray="188.5" stroke-dashoffset="0" />
                <circle class="gauge-fill red" id="gauge-temp" cx="70" cy="70" r="60" />
              </svg>
              <div class="gauge-value-center" id="txt-temp" style="color:#ef4444">--°C</div>
            </div>
            <div class="gauge-labels"><span>0</span><span>50</span></div>
          </div>
        </div>

        <!-- DEVICE INFO (WiFi RSSI ONLY) -->
        <div class="power-card"
          style="margin-top: 25px; background: var(--bg-card); padding: 18px 20px; border-radius: 16px; border: 1px solid var(--border);">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <span
              style="font-size: 0.85rem; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;">WiFi
              RSSI</span>
            <span id="info-rssi"
              style="font-size: 1.1rem; font-weight: 800; color: #10b981; transition: color 0.3s ease;">--</span>
          </div>
          <div class="progress-container"
            style="height: 10px; border-radius: 5px; background: rgba(255, 255, 255, 0.05); overflow: hidden;">
            <div class="progress-fill" id="info-bar-rssi"
              style="height: 100%; width: 0%; transition: width 0.5s ease, background-color 0.5s ease;"></div>
          </div>
        </div>

      </section>

    </main>

    <!-- THEME TOGGLE -->
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </div>

  <script>
    'use strict';

    // ===== CONFIGURATION =====
    const CONFIG = {
      SERVER_HOST: 'smartbox89.com',
      TOKEN: 'QkbaBmVPuqEVtr7wvfnGyBJp2i1pTV2H',
      REFRESH: 3000,
      TIMEOUT: 8000,
      VALVE_COOLDOWN: 5000
    };

    // Environment detection
    const isLocal = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
    const serverHost = isLocal ? CONFIG.SERVER_HOST : window.location.host;
    const secureProtocol = (window.location.protocol === 'https:' || isLocal) ? 'https:' : 'http:';
    const wsProtocol = secureProtocol === 'https:' ? 'wss:' : 'ws:';

    // Port 443 endpoints
    const BASE_URL_REALTIME = isLocal ? `https://${CONFIG.SERVER_HOST}/${CONFIG.TOKEN}` : `/api/${CONFIG.TOKEN}`;
    const WS_URL = isLocal ? `wss://${CONFIG.SERVER_HOST}/ws` : `${wsProtocol}//${serverHost}/ws`;

    // Diagnostic endpoints on port 8080
    const BASE_URL_DIAGNOSTICS = isLocal
      ? `http://${CONFIG.SERVER_HOST}:8080/${CONFIG.TOKEN}`
      : `http://${window.location.hostname}:8080/${CONFIG.TOKEN}`;

    // ===== CENTRALIZED VALVE STATE MANAGER =====
    const ValveManager = {
      confirmedState: { 1: null, 2: null },
      locked: { 1: false, 2: false },
      cooldownUntil: { 1: 0, 2: 0 },

      controlPin(zone) { return `V${zone - 1}`; },
      isLocked(zone) { return this.locked[zone]; },
      isInCooldown(zone) { return Date.now() < this.cooldownUntil[zone]; },

      updateFromPoll(zone, apiValue) {
        if (this.isLocked(zone) || this.isInCooldown(zone)) return;
        const newState = String(apiValue === '1' ? '1' : '0');
        if (this.confirmedState[zone] !== newState) {
          this.confirmedState[zone] = newState;
          this._renderZone(zone);
        }
      },

      async toggle(zone) {
        if (this.isLocked(zone)) return;

        const currentState = this.confirmedState[zone] || '0';
        const nextValue = (currentState === '1') ? '0' : '1';
        const pin = this.controlPin(zone);

        this.locked[zone] = true;
        this._renderZoneLoading(zone, true);

        // Try WebSocket first, fallback to HTTP fetch
        let success = false;
        if (blynkSocket && blynkSocket.connected) {
          success = blynkSocket.sendVirtualWrite(pin, nextValue);
        }

        if (!success) {
          try {
            const res = await fetch(`${BASE_URL_REALTIME}/update/${pin}?value=${nextValue}`, {
              method: 'GET',
              signal: AbortSignal.timeout(CONFIG.TIMEOUT)
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            this.confirmedState[zone] = nextValue;
          } catch (e) {
            console.error(`Toggle Zone ${zone} failed:`, e);
          } finally {
            this.cooldownUntil[zone] = Date.now() + CONFIG.VALVE_COOLDOWN;
            this.locked[zone] = false;
            this._renderZoneLoading(zone, false);
            this._renderZone(zone);
          }
        } else {
          // WS succeeded
          this.confirmedState[zone] = nextValue;
          this.cooldownUntil[zone] = Date.now() + CONFIG.VALVE_COOLDOWN;
          setTimeout(() => {
            this.locked[zone] = false;
            this._renderZoneLoading(zone, false);
            this._renderZone(zone);
          }, 300);
        }
      },

      _renderZone(zone) {
        const btn = el(`pbtn-${zone}`);
        if (!btn) return;
        const isOn = this.confirmedState[zone] === '1';
        if (isOn) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      },

      _renderZoneLoading(zone, loading) {
        const btn = el(`pbtn-${zone}`);
        if (!btn) return;
        btn.disabled = loading;
        btn.style.opacity = loading ? '0.5' : '1';
      }
    };

    // ===== UI HELPERS =====
    function el(id) { return document.getElementById(id); }

    function toggleTheme() {
      const body = document.body;
      const current = body.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      body.setAttribute('data-theme', next);
      localStorage.setItem('blynk-theme', next);
      const meta = document.getElementById('theme-color-meta');
      if (meta) meta.setAttribute('content', next === 'dark' ? '#121212' : '#f4f6f9');
    }

    function updateGauge(id, value, max) {
      const fill = el(`gauge-${id}`);
      const text = el(`txt-${id}`);
      if (!fill || !text) return;
      const val = parseFloat(value) || 0;
      const circumference = 188.5;
      const offset = circumference - (Math.min(val, max) / max) * circumference;
      fill.style.strokeDashoffset = offset;
      text.textContent = Math.round(val) + (id === 'temp' ? '°C' : '%');
    }

    function updateBar(id, value, max = 100) {
      const bar = el(`bar-${id}`);
      if (!bar) return;
      const val = parseFloat(value) || 0;
      bar.style.width = Math.min(100, (val / max) * 100) + '%';
    }

    function toggleValve(zone) { ValveManager.toggle(zone); }

    function updateStatusDot(id, isOnline) {
      const dot = el(id);
      if (!dot) return;
      if (isOnline) {
        dot.classList.add('active');
      } else {
        dot.classList.remove('active');
      }
    }

    // Convert RSSI value dynamically to standard scale
    function updateSignalUI(rssi) {
      const rssiVal = parseInt(rssi) || -120;
      let pct = Math.round((rssiVal + 120) * (100 / 90));
      pct = Math.min(100, Math.max(0, pct));

      let color = '#ef4444'; // Poor (0-24%)
      let label = 'Poor';

      if (pct >= 75) {
        color = '#22c55e'; // Excellent (75-100%)
        label = 'Excellent';
      } else if (pct >= 50) {
        color = '#eab308'; // Good (50-74%)
        label = 'Good';
      } else if (pct >= 25) {
        color = '#f97316'; // Weak (25-49%)
        label = 'Weak';
      }

      // Device Info WiFi RSSI display
      const infoRssi = el('info-rssi');
      if (infoRssi) {
        infoRssi.textContent = `${pct}% (${label})`;
        infoRssi.style.color = color;
      }
      const infoBar = el('info-bar-rssi');
      if (infoBar) {
        infoBar.style.width = `${pct}%`;
        infoBar.style.backgroundColor = color;
        infoBar.style.boxShadow = `0 0 10px ${color}`;
      }
    }

    // Ticking Local Clock
    function updateClock() {
      const clock = el('live-clock');
      if (!clock) return;
      const now = new Date();
      clock.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ===== BLYNK BINARY WEBSOCKET CLIENT =====
    class BlynkWS {
      constructor(url, token) {
        this.url = url;
        this.token = token;
        this.ws = null;
        this.msgId = 1;
        this.pingInterval = null;
        this.reconnectTimeout = null;
        this.connected = false;
      }

      connect() {
        console.log("Connecting WebSocket to:", this.url);
        this.ws = new WebSocket(this.url);
        this.ws.binaryType = 'arraybuffer';

        this.ws.onopen = () => {
          this.login();
        };

        this.ws.onmessage = (e) => {
          this.handleMessage(e.data);
        };

        this.ws.onclose = () => {
          this.cleanup();
          this.scheduleReconnect();
        };

        this.ws.onerror = (err) => {
          console.error("WS error:", err);
        };
      }

      login() {
        const tokenBytes = new TextEncoder().encode(this.token);
        const len = tokenBytes.length;
        const buf = new Uint8Array(5 + len);
        buf[0] = 0x02; // Login
        buf[1] = (this.msgId >> 8) & 0xFF;
        buf[2] = this.msgId & 0xFF;
        buf[3] = (len >> 8) & 0xFF;
        buf[4] = len & 0xFF;
        buf.set(tokenBytes, 5);
        this.ws.send(buf);
        this.msgId = (this.msgId + 1) % 65535;
      }

      sendPing() {
        if (!this.connected) return;
        const buf = new Uint8Array(5);
        buf[0] = 0x06; // Ping
        buf[1] = (this.msgId >> 8) & 0xFF;
        buf[2] = this.msgId & 0xFF;
        buf[3] = 0x00;
        buf[4] = 0x00;
        this.ws.send(buf);
        this.msgId = (this.msgId + 1) % 65535;
      }

      sendVirtualWrite(pin, value) {
        if (!this.connected || !this.ws || this.ws.readyState !== WebSocket.OPEN) return false;
        const bodyStr = `vw\0${pin}\0${value}`;
        const bodyBytes = new TextEncoder().encode(bodyStr);
        const len = bodyBytes.length;
        const buf = new Uint8Array(5 + len);
        buf[0] = 0x14; // Hardware
        buf[1] = (this.msgId >> 8) & 0xFF;
        buf[2] = this.msgId & 0xFF;
        buf[3] = (len >> 8) & 0xFF;
        buf[4] = len & 0xFF;
        buf.set(bodyBytes, 5);
        this.ws.send(buf);
        this.msgId = (this.msgId + 1) % 65535;
        return true;
      }

      handleMessage(data) {
        if (data.byteLength < 5) return;
        const view = new DataView(data);
        const cmd = view.getUint8(0);
        const val = view.getUint16(3);

        if (cmd === 0x00) {
          if (val === 200) {
            console.log("WebSocket connection authenticated");
            this.connected = true;
            this.pingInterval = setInterval(() => this.sendPing(), 5000);
            hideLoader();
          }
        } else if (cmd === 0x14) {
          const bodyBytes = new Uint8Array(data, 5, val);
          const bodyStr = new TextDecoder().decode(bodyBytes);
          const parts = bodyStr.split('\0');
          if (parts[0] === 'vw' && parts.length >= 3) {
            const pin = parts[1];
            const valStr = parts[2];
            this.processWSUpdate(pin, valStr);
          }
        }
      }

      processWSUpdate(pin, value) {
        if (pin === 'V0') ValveManager.updateFromPoll(1, value);
        if (pin === 'V1') ValveManager.updateFromPoll(2, value);

        renderWSMetrics(pin, value);
      }

      cleanup() {
        this.connected = false;
        if (this.pingInterval) {
          clearInterval(this.pingInterval);
          this.pingInterval = null;
        }
      }

      scheduleReconnect() {
        if (this.reconnectTimeout) clearTimeout(this.reconnectTimeout);
        this.reconnectTimeout = setTimeout(() => this.connect(), 3000);
      }
    }

    const blynkSocket = new BlynkWS(WS_URL, CONFIG.TOKEN);

    function renderWSMetrics(pin, value) {
      if (pin === 'V2') updateGauge('temp', value, 50);
      if (pin === 'V3') updateGauge('humi', value, 100);
      if (pin === 'V4') {
        el('val-soil').textContent = value;
        updateBar('soil', value);
      }
      if (pin === 'V5') {
        updateSignalUI(value);
      }
      if (pin === 'V6') {
        updateStatusDot('dot-lora', value === '1');
      }
    }

    // ===== POLLING REFRESH (FALLBACK) =====
    let isRefreshing = false;

    async function fetchPin(pin) {
      try {
        const res = await fetch(`${BASE_URL_REALTIME}/get/${pin}`, { signal: AbortSignal.timeout(CONFIG.TIMEOUT) });
        const text = await res.text();
        return parseBlynk(text);
      } catch (e) { return null; }
    }

    function parseBlynk(text) {
      if (!text) return null;
      const t = text.trim();
      if (t.startsWith('[')) {
        try { return JSON.parse(t)[0]; } catch { return null; }
      }
      return t.includes('not exist') ? null : t;
    }

    async function refresh() {
      if (isRefreshing) return;
      isRefreshing = true;

      try {
        const pins = ['V0', 'V1', 'V2', 'V3', 'V4', 'V5', 'V6'];

        // Get hardware connection status strictly on port 8080
        const [hwRes, ...pinRes] = await Promise.all([
          fetch(`${BASE_URL_DIAGNOSTICS}/isHardwareConnected`).then(r => r.text()).catch(() => 'false'),
          ...pins.map(p => fetchPin(p))
        ]);

        const hwOnline = hwRes.trim() === 'true';
        const data = {};
        pins.forEach((p, i) => data[p] = pinRes[i]);

        // Update hardware status indicator dot
        updateStatusDot('dot-hw', hwOnline);

        // Update Valves
        if (data.V0 !== null) ValveManager.updateFromPoll(1, String(data.V0));
        if (data.V1 !== null) ValveManager.updateFromPoll(2, String(data.V1));

        renderNonValve(data, hwOnline);

      } catch (e) {
        console.error('Refresh error', e);
      } finally {
        isRefreshing = false;
        hideLoader();
      }
    }

    function renderNonValve(data, hwOnline) {
      // Sensors
      el('val-soil').textContent = data.V4 || '--';
      updateBar('soil', data.V4);

      updateSignalUI(data.V5);

      // Gauges
      updateGauge('humi', data.V3, 100);
      updateGauge('temp', data.V2, 50);

      // Status Indicator Dot
      updateStatusDot('dot-lora', data.V6 === '1');
    }

    function hideLoader() {
      const loader = el('loading-overlay');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }
    }

    // Startup
    document.addEventListener('DOMContentLoaded', () => {
      // Connect WS
      blynkSocket.connect();

      // Trigger initial poll
      refresh();
      setInterval(refresh, CONFIG.REFRESH);

      // Safety timeout for loading spinner
      setTimeout(hideLoader, 1500);
    });
  </script>
</body>

</html>
